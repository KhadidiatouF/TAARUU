spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:makeupdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
server:
  port: 8080
jwt:
  secret: ${JWT_SECRET:makeup-platform-secret-key-2026}
  expiration: ${JWT_EXPIRATION:86400000}
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
